<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>H3ners Skindex</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0b0f1a;
    color: white;
    font-family: Inter, sans-serif;
    min-height: 100vh;
}

header {
    padding: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(90deg, #111827, #0f172a);
    position: sticky;
    top: 0;
    z-index: 100;
}

h1 {
    font-family: Orbitron, sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
}

.subtitle {
    opacity: 0.7;
    margin-top: 6px;
}

.top-bar {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

input, button, select {
    border: none;
    outline: none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
}

input, select {
    background: #1e293b;
    color: white;
}

button {
    background: #ff4655;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-1px);
    opacity: 0.9;
}

#stats {
    margin-top: 14px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    opacity: 0.9;
}

.stat-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 12px 16px;
    border-radius: 12px;
}

main {
    padding: 24px;
}

.weapon-section {
    margin-bottom: 48px;
}

.weapon-title {
    font-family: Orbitron, sans-serif;
    font-size: 1.4rem;
    margin-bottom: 16px;
    color: #ff4655;
    text-shadow: 0 0 10px rgba(255,70,85,0.5);
}

.skin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
}

.skin-card {
    background: linear-gradient(180deg, #111827, #0f172a);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    overflow: hidden;
    transition: 0.2s;
    backdrop-filter: blur(10px);
}

.skin-card:hover {
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.18);
}

.skin-image {
    width: 100%;
    height: 140px;
    object-fit: contain;
    background: #111827;
    padding: 10px;
}

.skin-content {
    padding: 14px;
}

.skin-name {
    font-weight: 700;
    font-size: 1rem;
}

.skin-collection {
    opacity: 0.65;
    margin-top: 4px;
    font-size: 0.9rem;
}

.owned {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.owner-tag {
    margin-top: 10px;
    display: inline-block;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
}

.owner-yes {
    background: rgba(34,197,94,0.18);
    color: #4ade80;
}

.owner-no {
    background: rgba(239,68,68,0.18);
    color: #f87171;
}

footer {
    padding: 24px;
    opacity: 0.6;
    text-align: center;
}

.admin-box {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.viewer-badge {
    padding: 12px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
}

@media (max-width: 700px) {
    .top-bar {
        flex-direction: column;
    }
}
</style>
</head>
<body>

<header>
    <h1>H3ners Skindex</h1>
    <div class="subtitle">See H3ners Shop Skins For the 100 Day Challenge.</div>

    <div class="top-bar">
        <div class="admin-box">
            <input type="password" id="adminPassword" placeholder="Admin password" />
            <button id="loginBtn">Owner Login</button>
            <button onclick="logoutAdmin()">Leave Owner Mode</button>
        </div>

        <input type="text" id="search" placeholder="Search skins..." />

        <select id="filterOwned">
            <option value="all">All Skins</option>
            <option value="owned">Owned Only</option>
            <option value="missing">Missing Only</option>
        </select>
    </div>

    <div id="stats">
        <div class="stat-card">Seen: <span id="ownedCount">0</span></div>
        <div class="stat-card">Total: <span id="totalCount">0</span></div>
        <div class="stat-card">Completion: <span id="completion">0%</span></div>
        <div class="viewer-badge" id="modeLabel">Viewer Mode</div>
    </div>
</header>

<main id="app"></main>

<footer>
Realtime VALORANT Shop Skin Tracker.
</footer>
<script type="module" src="skindex.js"></script>
</body>
</html>
